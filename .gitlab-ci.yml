stages:
  - format
  - type_check
  - security
  - test
  - coverage
  - build
  - deploy

variables:
  PYTHON_VERSION: "3.12"

# ── FORMAT ──────────────────────────────────────
format:
  stage: format
  image: python:3.12-slim
  before_script:
    - pip install black pyupgrade --quiet
  script:
    - black --check app.py
    - pyupgrade --py312-plus app.py || true
  allow_failure: true

# ── TYPE CHECK ──────────────────────────────────
type_check:
  stage: type_check
  image: python:3.12-slim
  before_script:
    - pip install mypy --quiet
  script:
    - mypy app.py --ignore-missing-imports
  allow_failure: true

# ── SECURITY ────────────────────────────────────
security:
  stage: security
  image: python:3.12-slim
  before_script:
    - pip install bandit pip-audit --quiet
  script:
    - bandit -r app.py -ll
    - pip-audit --requirement requirements.txt || true
  allow_failure: true

# ── TEST ────────────────────────────────────────
test:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt pytest --quiet
  script:
    - pytest tests/ -v --tb=short --junitxml=test-results.xml
  artifacts:
    reports:
      junit: test-results.xml
    when: always

# ── COVERAGE ────────────────────────────────────
coverage:
  stage: coverage
  image: python:3.12-slim
  before_script:
    - pip install -r requirements.txt pytest pytest-cov --quiet
  script:
    - pytest tests/ --cov=app --cov-report=term --cov-report=xml --cov-fail-under=50 || true
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

# ── BUILD ───────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t study-buddy:$CI_COMMIT_SHORT_SHA .
    - docker tag study-buddy:$CI_COMMIT_SHORT_SHA study-buddy:latest
  only:
    - main

# ── DEPLOY (manual) ─────────────────────────────
deploy:
  stage: deploy
  image: python:3.12-slim
  script:
    - pip install -r requirements.txt --quiet
    - echo "Deploy ready"
  when: manual
  only:
    - main
