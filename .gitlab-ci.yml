stages:
  - format
  - type_check
  - security
  - test
  - coverage
  - deploy

variables:
  PYTHON_VERSION: "3.12"

# ── FORMAT ──────────────────────────────────────
format:
  stage: format
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - uv pip install --system black --quiet
  script:
    - black --check app.py
  allow_failure: true

# ── TYPE CHECK ──────────────────────────────────
type_check:
  stage: type_check
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - uv pip install --system mypy --quiet
  script:
    - mypy app.py --ignore-missing-imports
  allow_failure: true

# ── SECURITY ────────────────────────────────────
security:
  stage: security
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - uv pip install --system bandit pip-audit --quiet
  script:
    - bandit -r app.py -ll
    - pip-audit --requirement requirements.txt || true
  allow_failure: true

# ── TEST ────────────────────────────────────────
test:
  stage: test
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - uv pip install --system -r requirements.txt --quiet
    - uv pip install --system pytest --quiet
  script:
    - pytest tests/ -v --tb=short --junitxml=test-results.xml
  artifacts:
    reports:
      junit: test-results.xml
    when: always

# ── COVERAGE ────────────────────────────────────
coverage:
  stage: coverage
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - uv pip install --system -r requirements.txt --quiet
    - uv pip install --system pytest pytest-cov --quiet
  script:
    - pytest tests/ --cov=app --cov-report=term --cov-report=xml --cov-fail-under=50
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  allow_failure: true

# ── DEPLOY (manual) ─────────────────────────────
deploy:
  stage: deploy
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  script:
    - uv pip install --system -r requirements.txt --quiet
    - echo "Deploy ready"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
